on:
  workflow_dispatch:
  push:
    branches: main

name: Quarto Publish

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.8.27"

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Discover R package dependencies
        id: deps
        run: |
          Rscript -e '
            install.packages(c("renv", "knitr", "rmarkdown"))
            pkgs <- unique(renv::dependencies(quiet = TRUE)$Package)
            pkgs <- setdiff(pkgs, c("R", rownames(installed.packages(priority = "base"))))
            writeLines(paste0("any::", sort(pkgs)), "r-packages.txt")
            cat("Detected", length(pkgs), "packages:\n")
            cat(paste(" -", sort(pkgs)), sep = "\n")'
          {
            echo "packages<<EOF"
            cat r-packages.txt
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Install R packages
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: ${{ steps.deps.outputs.packages }}
          cache-version: 1
          install-quarto: 'false'

      - name: Cache Typst packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/typst/packages
          key: typst-packages-${{ hashFiles('_extensions/**/*.typ', '_quarto.yml') }}
          restore-keys: typst-packages-

      - name: Render exercise site
        run: quarto render

      - name: Render solution site
        run: quarto render --profile solution

      - name: Copy solution labs into exercise site
        run: |
          mkdir -p _site/solutions
          cp -r _site-solution/labs/* _site/solutions/

      - name: Publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          render: "false"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
